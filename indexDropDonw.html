<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Dropdown Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            padding: 50px;
            background-color: #f8f9fa;
        }
        .container-exemplo {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container container-exemplo text-center">
        <h2 class="mb-4">Exemplo de Dropdown</h2>
        <p class="text-muted">Clique no botão abaixo para ver as opções.</p>

        <div class="dropdown">
            <button class="btn btn-primary btn-lg dropdown-toggle" type="button" id="meuDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                Menu de Opções
            </button>
            
            <ul class="dropdown-menu shadow" aria-labelledby="meuDropdown">
                <li><h6 class="dropdown-header">Configurações</h6></li>
                <li><a class="dropdown-item" href="#">Meu Perfil</a></li>
                <li><a class="dropdown-item" href="#">Segurança</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#">Sair da Conta</a></li>
            </ul>
        </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
